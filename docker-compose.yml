version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10
    volumes:
      - ./tests/fixtures/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -u root -proot"]
      interval: 2s
      timeout: 2s
      retries: 10
    volumes:
      - ./tests/fixtures/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
